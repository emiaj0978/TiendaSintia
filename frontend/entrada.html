<!DOCTYPE html>
<html lang="Es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Panel de Administración</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

    <!-- TOPBAR (solo visible en móvil) -->
    <div class="topbar">
        <div class="title-business">
            <span>SINTIA</span>
        </div>
        <div class="btn-menu">
            <button class="hamburger" aria-label="Abrir menú">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </div>

    <!-- OVERLAY -->
    <div class="overlay"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-logo">Tienda Sintia</div>
        <ul>
            <li>
                <a href="producto.html">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span>Producto</span>
                </a>
            </li>
            <li>
                <a href="categoria.html">
                    <i class="fa-solid fa-tags"></i>
                    <span>Categorias</span>
                </a>
            </li>
            <li>
                <a href="#" class="activo" data-page="home">
                    <i class="fa-solid fa-right-to-bracket"></i>
                    <span>Entrada</span>
                </a>
            </li>
            <li>
                <a href="salida.html">
                    <i class="fa-solid fa-truck"></i>
                    <span>Salida</span>
                </a>
            </li>
            <li class="nav-logout">
                <a href="#" id="btn-logout">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Cerrar sesión</span>
                </a>
            </li>
        </ul>
    </aside>

    <!-- CONTENIDO PRINCIPAL -->
    <main>
        <nav class="breadcrumb">
            <span>Inicio</span>
            <i class="fa-solid fa-chevron-right"></i>
            <span id="breadcrumb-page">Entrada</span>
        </nav>
        <div class="main-content">
            <div class="mb-2 d-flex justify-content-between align-items-center border-bottom pb-3">
                <h4 class="mb-0 fw-semibold"> Reporte de entrada
                </h4>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalRegistroCliente"> Registrar
                </button>

            </div>
            <div class="table-responsive">
                <table class="table">
                    <thead class="table-dark"> <!--da color a la tabla(parte-superior) -->
                        <tr>
                            <th>ID</th>
                            <th>fecha</th>
                            <th>cantidad</th>
                            <th>producto</th>
                            <th>Opsiones</th>

                        </tr>
                    </thead>
                    <tbody id="table-entrada">

                    </tbody>
                </table>
            </div>
        </div>
    </main>



    <!-- Modal REGISTRO DE CLIENTE-->
    <div class="modal fade" id="modalRegistroCliente" tabindex="-1" aria-labelledby="exampleModalLabel"
        aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">Modal title</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label for="" class="form-label">fecha</label>
                            <input type="text" class="form-control" id="c_fecha" name="fecha" required>
                        </div>
                        <div class="mb-3">
                            <label for="" class="form-label">cantidad</label>
                            <input type="text" class="form-control" id="c_cantidad" name="cantidad" required>
                            <div class="mb-3">
                                <label class="form-label">Producto</label>
                                <select class="form-control" id="c_producto" required>
                                    <option value="">Seleccione...</option>
                                </select>
                            </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    <button type="button" class="btn btn-primary" id="btn-crearcliente">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal EDITAR-CLIENTE-->
    <div class="modal fade" id="modalEditarCliente" tabindex="-1" aria-labelledby="exampleModalLabel"
        aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">Modal title</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label for="" class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="c_u_nombre" name="nombre" required>
                        </div>
                        <div class="mb-3">
                            <label for="" class="form-label">Apellido</label>
                            <input type="text" class="form-control" id="c_u_apellido" name="apellido" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    <button type="button" class="btn btn-primary" id="btn-Editarcliente">Actualizar</button>
                </div>
            </div>
        </div>
    </div>



    <script src="js/main3.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>

<!--en bootstrap se hace  los estos(boostrap 5) -->
