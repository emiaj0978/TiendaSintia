<!DOCTYPE html>
<html lang="Es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Panel de Administración</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

    <!-- TOPBAR (solo visible en móvil) -->
    <div class="topbar">
        <div class="title-business">
            <span>SINTIA</span>
        </div>
        <div class="btn-menu">
            <button class="hamburger" aria-label="Abrir menú">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </div>

    <!-- OVERLAY -->
    <div class="overlay"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-logo">Dashboard</div>
        <ul>
            <li>
                <a href="index.html"  >
                    <i class="fa-solid fa-house"></i>
                    <span>Inicio</span>
                </a>
            </li>
            <li>
                <a href="#" class="activo" data-page="reportes">
                    <i class="fa-solid fa-clipboard-list"></i>
                    <span>Categorias</span>
                </a>
            </li>
            <li>
                <a href="entrada.html" >
                    <i class="fa-solid fa-clipboard-list"></i>
                    <span>Entrada</span>
                </a>
            </li>
            <li>
                <a href="salida.html" >
                    <i class="fa-solid fa-clipboard-list"></i>
                    <span>Salida</span>
                </a>
            </li>
            <li class="nav-logout">
                <a href="#" id="btn-logout">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Cerrar sesión</span>
                </a>
            </li>
        </ul>
    </aside>

    <!-- CONTENIDO PRINCIPAL -->
    <main>
        <nav class="breadcrumb">
            <span>Inicio</span>
            <i class="fa-solid fa-chevron-right"></i>
            <span id="breadcrumb-page">Categorias</span>
        </nav>
        <div class="main-content">
            <div class="mb-2 d-flex justify-content-between align-items-center border-bottom pb-3">
                <h4 class="mb-0 fw-semibold"> Reporte de categorias
                </h4>
                <button class="btn btn-primary"> Registrar
                </button>

            </div>
            <div class="table-responsive">
                <table class="table">
                    <thead class="table-dark"> <!--da color a la tabla(parte-superior) -->
                        <tr>
                            <th>ID</th>
                            <th>nombre_categoria</th>
                            <th>descripcion</th>
                            <th>Opsiones</th>
                            
                        </tr>
                    </thead>
                    <tbody id="table-categoria">

                    </tbody>
                </table>
            </div>
        </div>
        


        
    </main>
    

    <script src="js/main2.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>

<!--en bootstrap se hace  los estos(boostrap 5) -->
